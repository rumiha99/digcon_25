<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Firebase</title>

  <!-- Firebase SDK（v9以降の互換版をCDNで読み込み） -->

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: 'Segoe UI', sans-serif;

      padding-top: 20vh;
    }

    h1 {
      font-size: 4rem;
      animation: fadeIn 2s ease-in-out;
    }

    @keyframes fadeIn {

      margin-top: 1rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>Hello, Firebase!</h1>
  <div class="subtitle">Firebase Hostingで動作中</div>

    // Firebaseを初期化

  </script>

</html>
